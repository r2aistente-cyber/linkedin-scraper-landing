<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Icons</title></head>
<body>
<script>
function makeIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Fondo azul LinkedIn con esquinas redondeadas
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0a66c2';
  ctx.fill();

  // Ícono de "extracción": flecha hacia abajo + líneas
  const pad = size * 0.2;
  const w = size - pad * 2;
  const cx = size / 2;

  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = Math.max(1, size * 0.09);
  ctx.lineCap = 'round';

  // Línea horizontal superior (representa datos)
  const lineY1 = size * 0.28;
  const lineY2 = size * 0.42;
  const lineY3 = size * 0.56;
  const lw = w * 0.7;

  ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.moveTo(cx - lw/2, lineY1); ctx.lineTo(cx + lw/2, lineY1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - lw/2, lineY2); ctx.lineTo(cx + lw/2 * 0.7, lineY2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - lw/2, lineY3); ctx.lineTo(cx + lw/2 * 0.4, lineY3); ctx.stroke();
  ctx.globalAlpha = 1;

  // Flecha hacia abajo
  const arrowX = cx + w * 0.22;
  const arrowTop = size * 0.35;
  const arrowBot = size * 0.72;
  const arrowW = w * 0.22;

  ctx.lineWidth = Math.max(1, size * 0.08);
  ctx.beginPath();
  ctx.moveTo(arrowX, arrowTop);
  ctx.lineTo(arrowX, arrowBot - arrowW * 0.8);
  ctx.stroke();

  // Punta de flecha
  ctx.beginPath();
  ctx.moveTo(arrowX - arrowW / 2, arrowBot - arrowW * 0.8);
  ctx.lineTo(arrowX, arrowBot);
  ctx.lineTo(arrowX + arrowW / 2, arrowBot - arrowW * 0.8);
  ctx.closePath();
  ctx.fill();

  return canvas;
}

function download(canvas, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

[16, 48, 128].forEach(size => {
  setTimeout(() => {
    const canvas = makeIcon(size);
    download(canvas, `icon${size}.png`);
    document.body.appendChild(canvas);
    canvas.style.margin = '8px';
    canvas.style.border = '1px solid #ccc';
  }, size); // pequeño delay entre descargas
});
</script>
<p style="font-family:sans-serif;padding:16px">Generando iconos... revisa tus descargas.<br>Mueve los 3 archivos PNG a la carpeta <code>extension/icons/</code></p>
</body>
</html>
