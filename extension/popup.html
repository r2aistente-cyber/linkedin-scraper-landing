<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Profile Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #f3f2f1;
      color: #1d1d1d;
    }
    header {
      background: #0a66c2;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header span { font-size: 20px; }
    .body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #666;
      margin-bottom: 8px;
    }
    .status-line {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 10px;
    }
    .status-line.muted { color: #888; font-weight: 400; font-size: 13px; }
    .status-line.success { color: #057642; }
    .status-line.warn { color: #b24020; }
    btn, button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      transition: opacity .15s;
    }
    btn:hover, button:hover { opacity: .85; }
    .btn-primary { background: #0a66c2; color: #fff; width: 100%; justify-content: center; }
    .btn-secondary { background: #e9e5df; color: #1d1d1d; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 16px; }
    .export-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
    }
    .option-row input[type=checkbox] { width: 15px; height: 15px; accent-color: #0a66c2; cursor: pointer; }
    textarea {
      width: 100%;
      height: 80px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      resize: vertical;
      font-family: monospace;
      color: #333;
    }
    textarea:focus { outline: 2px solid #0a66c2; border-color: transparent; }
    .progress-bar-wrap {
      background: #e9e5df;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin: 8px 0 4px;
    }
    .progress-bar { height: 100%; background: #0a66c2; transition: width .3s; }
    .progress-label { font-size: 11px; color: #666; }
    .batch-item {
      font-size: 12px;
      padding: 3px 0;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .total-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #0a66c2;
      color: #fff;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .hidden { display: none !important; }
    #page-not-linkedin { color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <span>🔗</span>
    <h1>LinkedIn Profile Scraper</h1>
  </header>

  <div class="body">

    <!-- Estado de la página actual -->
    <div class="card">
      <div class="card-title">📊 Current page</div>
      <div id="page-status" class="status-line muted">Detecting...</div>
      <div id="extract-section" class="hidden">
        <button id="btn-extract" class="btn-primary" style="margin-top:8px">
          📥 Extract all
        </button>
      </div>
      <div id="page-not-linkedin" class="hidden">
        Open a LinkedIn search page or profile to start.
      </div>
    </div>

    <!-- Opciones -->
    <div class="card">
      <div class="card-title">⚙️ Options</div>
      <label class="option-row">
        <input type="checkbox" id="opt-scroll" checked />
        Auto-scroll to load more results
      </label>
      <label class="option-row">
        <input type="checkbox" id="opt-url" checked />
        Include profile URL
      </label>
      <label class="option-row">
        <input type="checkbox" id="opt-email" />
        Only profiles with email (not available via DOM)
      </label>
    </div>

    <!-- Última extracción + exportar -->
    <div class="card" id="export-card">
      <div class="card-title">📦 Extracted profiles</div>
      <div id="last-extraction" class="status-line muted">No data yet</div>
      <div class="export-row" style="margin-top:10px">
        <button class="btn-secondary btn-sm" id="btn-csv">📥 CSV</button>
        <button class="btn-secondary btn-sm" id="btn-excel">📥 Excel</button>
        <button class="btn-secondary btn-sm" id="btn-json">📥 JSON</button>
        <button class="btn-secondary btn-sm" id="btn-clear" style="color:#b24020">🗑 Clear</button>
      </div>
    </div>

    <!-- Modo batch -->
    <div class="card">
      <div class="card-title">🔤 Batch mode — paste LinkedIn URLs</div>
      <textarea id="batch-urls" placeholder="https://linkedin.com/in/juan-perez&#10;https://linkedin.com/in/maria-garcia&#10;https://linkedin.com/in/carlos-lopez"></textarea>
      <button id="btn-batch" class="btn-primary" style="margin-top:8px">▶ Extract all</button>

      <div id="batch-progress-wrap" class="hidden" style="margin-top:10px">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="batch-bar" style="width:0%"></div>
        </div>
        <div class="progress-label" id="batch-label">0 / 0</div>
        <div id="batch-items"></div>
      </div>
    </div>

    <!-- Total global -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 2px">
      <span style="color:#666;font-size:12px">Total extracted today</span>
      <span class="total-badge" id="total-badge">0 profiles</span>
    </div>

  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
